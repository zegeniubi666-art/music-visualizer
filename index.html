<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/music-visualizer/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>王鑫泽 - 娱乐营销剪辑师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/music-visualizer/assets/index-D0fSNwm_.js"></script>
    <link rel="stylesheet" crossorigin href="/music-visualizer/assets/index-Dgrgc9SW.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      .hero-bg-text {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        pointer-events: none;
        user-select: none;
        z-index: 1;
        overflow: hidden;
      }
      .hero-bg-text span {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        font-size: clamp(6rem, 18vw, 18rem);
        color: rgba(255, 255, 255, 0.06);
        letter-spacing: 0.05em;
        white-space: nowrap;
        line-height: 0.85;
        animation: heroTextFadeIn 1.5s ease-out forwards;
        padding-left: clamp(2rem, 8vw, 6rem);
      }
      .hero-bg-text .bg-second {
        font-size: clamp(5rem, 15vw, 15rem);
        color: rgba(255, 255, 255, 0.04);
        padding-left: clamp(4rem, 12vw, 10rem);
      }
      .hero-accent-line {
        position: absolute;
        left: clamp(2rem, 8vw, 6rem);
        top: 50%;
        width: clamp(2rem, 4vw, 4rem);
        height: 2px;
        background: linear-gradient(90deg, #6366f1, transparent);
        z-index: 2;
        pointer-events: none;
      }
      .hero-accent-dot {
        position: absolute;
        left: clamp(2rem, 8vw, 6rem);
        top: 50%;
        transform: translateY(4rem);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6366f1;
        z-index: 2;
        pointer-events: none;
        box-shadow: 0 0 20px #6366f1;
      }
      @keyframes heroTextFadeIn {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="hero-bg-text" aria-hidden="true">
      <span>WANGXINZE</span>
      <span class="bg-second">WANGXINZE</span>
    </div>
    <div class="hero-accent-line" aria-hidden="true"></div>
    <div class="hero-accent-dot" aria-hidden="true"></div>
  </body>
</html>
