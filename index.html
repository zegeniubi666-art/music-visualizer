<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Music Visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none
}
canvas{display:block;width:100vw;height:100vh}

#dropOverlay{
  position:fixed;inset:0;z-index:100;
  display:none;align-items:center;justify-content:center;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:3px dashed rgba(255,255,255,.2);
}
#dropOverlay.active{display:flex}
#dropOverlay .drop-icon{font-size:64px;margin-bottom:16px;text-align:center}
#dropOverlay .drop-text{font-size:22px;color:rgba(255,255,255,.7);letter-spacing:2px}

#controls{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;
  background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:14px;border:1px solid rgba(255,255,255,.08);
  z-index:10;transition:opacity .4s,transform .4s;
  flex-wrap:wrap;justify-content:center;
}
#controls.hidden{opacity:0;transform:translateX(-50%) translateY(24px);pointer-events:none}

.btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:12px;line-height:1.4;transition:all .2s;
  white-space:nowrap;font-family:inherit;
}
.btn:hover{background:rgba(255,255,255,.15)}
.btn:active{transform:scale(.96)}
.btn.active{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.btn.primary{background:rgba(100,180,255,.2);border-color:rgba(100,180,255,.3)}
.btn.primary.active{background:rgba(100,180,255,.35);border-color:rgba(100,180,255,.5)}
.btn.danger.active{background:rgba(255,80,80,.25);border-color:rgba(255,80,80,.4)}
.file-btn input{display:none}
.divider{width:1px;height:24px;background:rgba(255,255,255,.1);margin:0 4px}
#fileName{font-size:11px;color:rgba(255,255,255,.5);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#progressWrap{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.05);z-index:11}
#progressBar{height:100%;width:0%;background:linear-gradient(90deg,var(--prog-from,#7b68ee),var(--prog-to,#00d4ff));transition:width .1s linear;border-radius:0 2px 2px 0}

.color-dot{
  width:20px;height:20px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.color-dot:hover{transform:scale(1.15)}
.color-dot.active{border-color:#fff;transform:scale(1.1)}

@media(max-width:640px){
  #controls{gap:4px;padding:8px 10px;bottom:16px;border-radius:12px}
  .btn{font-size:11px;padding:5px 8px}
  .color-dot{width:16px;height:16px}
  .divider{margin:0 2px}
  #dropOverlay .drop-text{font-size:17px}
  #dropOverlay .drop-icon{font-size:44px}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="progressWrap"><div id="progressBar"></div></div>

<div id="dropOverlay">
  <div>
    <div class="drop-icon">🎵</div>
    <div class="drop-text">Drop your music here</div>
  </div>
</div>

<div id="controls">
  <div class="btn-group" id="modeGroup">
    <button class="btn active" data-mode="bars" title="Frequency bars">▂▄▆</button>
    <button class="btn" data-mode="wave" title="Waveform">≈</button>
    <button class="btn" data-mode="circle" title="Radial spectrum">◉</button>
    <button class="btn" data-mode="particles" title="Particle system">✦</button>
  </div>
  <div class="divider"></div>
  <div class="btn-group" id="themeGroup" style="display:flex;gap:6px;align-items:center"></div>
  <div class="divider"></div>
  <label class="btn file-btn" title="Open audio file">
    <input type="file" accept="audio/*" id="fileInput">📁
  </label>
  <button class="btn" id="micBtn" title="Microphone input">🎤</button>
  <button class="btn" id="playBtn" title="Play/Pause" disabled>▶</button>
</div>

<script>
// ====== Color Themes ======
const THEMES=[
  {name:'Neon',   colors:['#ff6ec7','#7b68ee','#00d4ff','#00ff87']},
  {name:'Sunset', colors:['#ff4500','#ff8c00','#ffd700','#ff1493']},
  {name:'Ocean',  colors:['#006994','#00b4d8','#48cae4','#90e0ef']},
  {name:'Aurora', colors:['#00ff87','#60efff','#7b68ee','#ff6ec7']},
  {name:'Fire',   colors:['#ff0000','#ff4500','#ff8c00','#ffd700']},
];

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function lerpHex(a,b,t){const ca=hexToRgb(a),cb=hexToRgb(b);return`rgb(${ca.r+(cb.r-ca.r)*t|0},${ca.g+(cb.g-ca.g)*t|0},${ca.b+(cb.b-ca.b)*t|0})`}
function gradAt(colors,t){
  if(t<=0)return colors[0];if(t>=1)return colors[colors.length-1]
  const seg=t*(colors.length-1),idx=Math.floor(seg),frac=seg-idx
  return lerpHex(colors[idx],colors[Math.min(idx+1,colors.length-1)],frac)
}

// ====== DOM ======
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
}
window.addEventListener('resize',resize);resize();

const dropOverlay=document.getElementById('dropOverlay');
const fileInput=document.getElementById('fileInput');
const micBtn=document.getElementById('micBtn');
const playBtn=document.getElementById('playBtn');
const fileName=document.getElementById('fileName');
const progressBar=document.getElementById('progressBar');
const modeBtns=document.querySelectorAll('[data-mode]');
const themeGroup=document.getElementById('themeGroup');

// ====== Audio Engine ======
const AUDIO={ctx:null,analyser:null,gain:null,mode:'demo',isPlaying:false,isMic:false,
  sourceNode:null,buffer:null,startTime:0,pausedAt:0,bufferDuration:0,data:[],waveData:[]};

async function initAudio(){
  if(AUDIO.ctx)return;
  AUDIO.ctx=new(window.AudioContext||window.webkitAudioContext)();
  AUDIO.analyser=AUDIO.ctx.createAnalyser();
  AUDIO.analyser.fftSize=256;
  AUDIO.gain=AUDIO.ctx.createGain();
  AUDIO.gain.gain.value=.85;
  AUDIO.analyser.connect(AUDIO.gain);
  AUDIO.gain.connect(AUDIO.ctx.destination);
  AUDIO.data=new Uint8Array(AUDIO.analyser.frequencyBinCount);
  AUDIO.waveData=new Uint8Array(AUDIO.analyser.fftSize);
}

function getAudioData(){
  if(AUDIO.mode==='file'&&AUDIO.analyser){
    AUDIO.analyser.getByteFrequencyData(AUDIO.data);
    return AUDIO.data;
  }
  if(AUDIO.mode==='mic'&&AUDIO.analyser){
    AUDIO.analyser.getByteFrequencyData(AUDIO.data);
    return AUDIO.data;
  }
  return generateFakeData(performance.now()/1000);
}

function getWaveData(){
  if((AUDIO.mode==='file'||AUDIO.mode==='mic')&&AUDIO.analyser){
    AUDIO.analyser.getByteTimeDomainData(AUDIO.waveData);
    return AUDIO.waveData;
  }
  return null;
}

function generateFakeData(t){
  const d=new Uint8Array(128);
  for(let i=0;i<128;i++){
    const bass=Math.sin(t*2.1)*.5+.5;
    const mid=Math.sin(t*3.7+i*.08+Math.sin(t*.7)*.5)*.35+.5;
    const high=Math.sin(t*5.3+i*.15+Math.sin(t*1.3)*.3)*.2+.3;
    const beat1=Math.max(0,Math.sin(t*Math.PI*2*2))**8;
    const beat2=Math.max(0,Math.sin(t*Math.PI*2*1.33+1))**6;
    const val=bass*(1-i/128)*.9+mid*(1-Math.abs(i-40)/50)*.8+high*(i/128)*.4;
    const beatBoost=beat1*Math.exp(-i/20)*.6+beat2*Math.exp(-i/30)*.4;
    d[i]=Math.min(255,(val+beatBoost)*255|0);
  }
  return d;
}

function generateFakeWave(t){
  const d=new Uint8Array(256);
  for(let i=0;i<256;i++){
    const x=i/256;
    const v=Math.sin(t*4+x*Math.PI*4)*.3+Math.sin(t*7+x*Math.PI*8)*.2+Math.sin(t*2.3+x*Math.PI*2)*.4+Math.sin(t*11+x*Math.PI*12)*.1;
    d[i]=((v*.7+Math.random()*.06)+1)/2*255|0;
  }
  return d;
}

// ====== File loading ======
async function loadFile(file){
  await initAudio();
  if(AUDIO.sourceNode){try{AUDIO.sourceNode.stop()}catch(e){}AUDIO.sourceNode.disconnect()}
  if(AUDIO.isMic){await stopMic()}
  const ab=await file.arrayBuffer();
  AUDIO.buffer=await AUDIO.ctx.decodeAudioData(ab);
  AUDIO.bufferDuration=AUDIO.buffer.duration;
  AUDIO.mode='file';
  playSource();
  document.title=file.name+' - Music Visualizer';
  dropOverlay.classList.remove('active');
  playBtn.disabled=false;playBtn.textContent='⏸';
}

function playSource(){
  if(AUDIO.sourceNode){try{AUDIO.sourceNode.stop()}catch(e){}AUDIO.sourceNode.disconnect()}
  AUDIO.sourceNode=AUDIO.ctx.createBufferSource();
  AUDIO.sourceNode.buffer=AUDIO.buffer;
  AUDIO.sourceNode.connect(AUDIO.analyser);
  AUDIO.startTime=AUDIO.ctx.currentTime;
  AUDIO.sourceNode.start(0);
  AUDIO.isPlaying=true;
  AUDIO.sourceNode.onended=()=>{
    if(AUDIO.ctx.currentTime-AUDIO.startTime>=AUDIO.bufferDuration){
      AUDIO.mode='demo';AUDIO.isPlaying=false;
      playBtn.textContent='▶';document.title='Music Visualizer';
    }
  };
}

// ====== Microphone ======
let micStream=null;
async function startMic(){
  await initAudio();
  if(AUDIO.mode==='file'&&AUDIO.sourceNode){try{AUDIO.sourceNode.stop()}catch(e){}AUDIO.sourceNode.disconnect();AUDIO.sourceNode=null;AUDIO.mode='demo'}
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,echoCancellation:true});
    const micSource=AUDIO.ctx.createMediaStreamSource(micStream);
    micSource.connect(AUDIO.analyser);
    AUDIO.isMic=true;AUDIO.mode='mic';
    micBtn.classList.add('primary','active');
    playBtn.textContent='▶';playBtn.disabled=true;
    dropOverlay.classList.remove('active');
    document.title='Mic - Music Visualizer';
  }catch(e){
    console.warn('Mic access denied');
    micBtn.classList.remove('primary','active');
  }
}

async function stopMic(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}
  AUDIO.isMic=false;
  if(AUDIO.mode==='mic')AUDIO.mode='demo';
  micBtn.classList.remove('primary','active');
  document.title='Music Visualizer';
}

// ====== Play/Pause ======
function togglePlay(){
  if(AUDIO.mode!=='file')return;
  if(AUDIO.ctx.state==='suspended'){
    AUDIO.ctx.resume();
    playBtn.textContent='⏸';
    AUDIO.isPlaying=true;
  }else{
    AUDIO.ctx.suspend();
    playBtn.textContent='▶';
    AUDIO.isPlaying=false;
  }
}

// ====== Visualization Renderers ======
let prevData=new Uint8Array(128);
let peakData=new Uint8Array(128);
let peakVel=new Float32Array(128);
for(let i=0;i<128;i++){prevData[i]=0;peakData[i]=0;peakVel[i]=0}

function smoothData(data,smoothFactor){
  for(let i=0;i<data.length;i++){
    prevData[i]=prevData[i]+(data[i]-prevData[i])*smoothFactor;
    data[i]=prevData[i]|0;
  }
  return data;
}

function updatePeaks(data){
  for(let i=0;i<data.length;i++){
    if(data[i]>=peakData[i]){peakData[i]=data[i];peakVel[i]=0}
    else{peakVel[i]+=.015;peakData[i]=Math.max(0,peakData[i]-peakVel[i]*3)}
  }
}

// --- Bars ---
function renderBars(data,theme,t){
  const count=64;const gap=2;const totalWidth=W*0.92;
  const barW=Math.max(2,totalWidth/count-gap);
  const startX=(W-totalWidth)/2;const baseY=H*0.88;
  const maxH=H*0.75;

  for(let i=0;i<count;i++){
    const idx=(i/count*data.length)|0;
    const val=data[idx]/255;
    const h=val*maxH;
    const x=startX+i*(barW+gap);
    const y=baseY-h;
    const color=gradAt(theme,i/count);

    ctx.shadowColor=color;ctx.shadowBlur=12;
    ctx.fillStyle=color;
    const r=Math.min(barW/2,4);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+barW,y,x+barW,baseY,r);
    ctx.arcTo(x+barW,baseY,x,baseY,r);
    ctx.arcTo(x,baseY,x,y,r);
    ctx.arcTo(x,y,x+r,y,r);
    ctx.fill();
    ctx.shadowBlur=0;

    if(peakData[idx]){
      const py=baseY-peakData[idx]/255*maxH;
      ctx.fillStyle='rgba(255,255,255,.8)';
      ctx.shadowColor='rgba(255,255,255,.6)';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(x+barW/2,py,Math.max(2,barW/3),0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  }
}

// --- Wave ---
function renderWave(data,theme,t){
  if(!data||data.length<2)return;
  const count=data.length;
  const midY=H/2;const amp=H*0.35;
  const step=W/(count-1);

  const color=theme[0];
  ctx.shadowColor=color;ctx.shadowBlur=20;
  ctx.strokeStyle=color;ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<count;i++){
    const val=(data[i]/128)-1;
    const x=i*step;const y=midY+val*amp;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();ctx.shadowBlur=0;

  const grad=ctx.createLinearGradient(0,midY-amp,0,midY+amp);
  const c=hexToRgb(theme[0]);
  grad.addColorStop(0,`rgba(${c.r},${c.g},${c.b},0)`);
  grad.addColorStop(.45,`rgba(${c.r},${c.g},${c.b},.15)`);
  grad.addColorStop(.55,`rgba(${c.r},${c.g},${c.b},.15)`);
  grad.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(0,midY);
  for(let i=0;i<count;i++){
    const val=(data[i]/128)-1;
    ctx.lineTo(i*step,midY+val*amp);
  }
  ctx.lineTo(W,midY);ctx.closePath();ctx.fill();

  ctx.shadowColor=color;ctx.shadowBlur=8;
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=.4;
  ctx.beginPath();
  for(let i=0;i<count;i++){
    const val=(data[i]/128)-1;
    const x=i*step;const y=midY-val*amp;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// --- Circle ---
function renderCircle(data,theme,t){
  const cx=W/2,cy=H/2;
  const radius=Math.min(W,H)*0.32;
  const count=64;
  const angleStep=Math.PI*2/count;
  const rotation=t*0.05;

  let bass=0;
  for(let i=0;i<8;i++)bass+=data[i]/255;
  bass/=8;

  ctx.shadowColor=theme[0];ctx.shadowBlur=30;
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,radius*0.15);
  const c=hexToRgb(theme[0]);
  grad.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${bass*.4})`);
  grad.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(cx,cy,radius*0.15,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  for(let i=0;i<count;i++){
    const idx=(i/count*data.length)|0;
    const val=data[idx]/255;
    const angle=angleStep*i+rotation;
    const inner=radius*0.25;
    const outer=inner+val*radius*0.55;

    const color=gradAt(theme,i/count);
    ctx.shadowColor=color;ctx.shadowBlur=10;
    ctx.strokeStyle=color;ctx.lineWidth=Math.max(2,val*10);
    ctx.lineCap='round';
    const x1=cx+Math.cos(angle)*inner;
    const y1=cy+Math.sin(angle)*inner;
    const x2=cx+Math.cos(angle)*outer;
    const y2=cy+Math.sin(angle)*outer;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.shadowBlur=0;
  }

  for(let i=0;i<count;i++){
    const idx=(i/count*data.length)|0;
    if(peakData[idx]/255>.05){
      const angle=angleStep*i+rotation;
      const inner=radius*0.25;
      const outer=inner+peakData[idx]/255*radius*0.55;
      ctx.fillStyle='rgba(255,255,255,.8)';
      ctx.shadowColor='rgba(255,255,255,.5)';ctx.shadowBlur=6;
      const x=cx+Math.cos(angle)*outer;
      const y=cy+Math.sin(angle)*outer;
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  }
}

// --- Particles ---
const particles=[];
function initParticles(){
  if(particles.length)return;
  for(let i=0;i<128;i++){
    particles.push({
      x:Math.random()*W,baseX:0,
      y:Math.random()*H,
      vy:0,vx:0,
      size:2,targetSize:2,
      freqIdx:i,
      hueOffset:Math.random()*Math.PI*2,
    });
  }
}
initParticles();

function renderParticles(data,theme,t){
  for(const p of particles){
    const idx=p.freqIdx;
    const val=data[idx]/255;
    const normIdx=idx/data.length;

    const targetY=H*0.1+val*H*0.75;
    p.targetSize=1+val*12;
    const color=gradAt(theme,normIdx);

    p.x+=Math.sin(t*0.5+p.hueOffset)*0.3;
    p.vy+=(targetY-p.y)*0.03;
    p.vy*=0.92;
    p.y+=p.vy;
    p.size+=(p.targetSize-p.size)*0.1;

    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;

    ctx.shadowColor=color;ctx.shadowBlur=p.size*4;
    ctx.fillStyle=color;
    ctx.globalAlpha=Math.min(1,val*1.2+0.2);
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,p.size),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;

    if(p.size>4){
      ctx.fillStyle=color;ctx.globalAlpha=val*0.3;
      ctx.shadowBlur=p.size*8;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
  }
}

// ====== Main Loop ======
let currentTheme=0;
let currentMode='bars';
let lastFrame=0;

function renderFrame(timestamp){
  requestAnimationFrame(renderFrame);
  const time=timestamp/1000;

  const rawData=getAudioData();
  const waveData=AUDIO.mode!=='demo'?getWaveData():generateFakeWave(time);

  const data=smoothData(rawData,.3);
  updatePeaks(data);

  const theme=THEMES[currentTheme].colors;

  // Trail effect for particles mode
  if(currentMode==='particles'){
    ctx.fillStyle='rgba(10,10,15,.25)';
    ctx.fillRect(0,0,W,H);
  }else{
    ctx.clearRect(0,0,W,H);
  }

  // Draw subtle background
  const bgGrad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  const bgc=hexToRgb(theme[0]);
  bgGrad.addColorStop(0,`rgba(${bgc.r},${bgc.g},${bgc.b},.04)`);
  bgGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,W,H);

  switch(currentMode){
    case'bars':renderBars(data,theme,time);break;
    case'wave':renderWave(waveData,theme,time);break;
    case'circle':renderCircle(data,theme,time);break;
    case'particles':renderParticles(data,theme,time);break;
  }

  // Progress bar for file mode
  if(AUDIO.mode==='file'&&AUDIO.buffer){
    const elapsed=AUDIO.ctx.currentTime-AUDIO.startTime;
    const pct=Math.min(elapsed/AUDIO.bufferDuration*100,100);
    progressBar.style.width=pct+'%';
    document.documentElement.style.setProperty('--prog-from',theme[0]);
    document.documentElement.style.setProperty('--prog-to',theme[theme.length-1]);
    if(pct>=100){AUDIO.mode='demo';playBtn.textContent='▶';progressBar.style.width='0%'}
  }else{progressBar.style.width='0%'}
}

requestAnimationFrame(renderFrame);

// ====== UI Events ======
modeBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    modeBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMode=btn.dataset.mode;
  });
});

THEMES.forEach((th,i)=>{
  const dot=document.createElement('div');
  dot.className='color-dot'+(i===currentTheme?' active':'');
  dot.style.background=`linear-gradient(135deg,${th.colors[0]},${th.colors[th.colors.length-1]})`;
  dot.title=th.name;
  dot.addEventListener('click',()=>{
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
    dot.classList.add('active');
    currentTheme=i;
  });
  themeGroup.appendChild(dot);
});

// File input
fileInput.addEventListener('change',e=>{
  if(e.target.files[0])loadFile(e.target.files[0]);
  e.target.value='';
});

// Drag & drop
document.addEventListener('dragover',e=>{e.preventDefault();dropOverlay.classList.add('active')});
document.addEventListener('dragleave',()=>{dropOverlay.classList.remove('active')});
document.addEventListener('drop',e=>{
  e.preventDefault();dropOverlay.classList.remove('active');
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('audio/'))loadFile(file);
});

// Mic
micBtn.addEventListener('click',async()=>{
  if(AUDIO.isMic){await stopMic()}
  else{await startMic()}
});

// Play/Pause
playBtn.addEventListener('click',togglePlay);

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(AUDIO.mode==='file')togglePlay();return}
  const modes=['bars','wave','circle','particles'];
  const n=parseInt(e.key);
  if(n>=1&&n<=4){
    currentMode=modes[n-1];
    modeBtns.forEach(b=>b.classList.toggle('active',b.dataset.mode===currentMode));
  }
});

// Auto-hide controls on idle
let hideTimer=null;
function resetHide(){
  document.getElementById('controls').classList.remove('hidden');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>{document.getElementById('controls').classList.add('hidden')},3000);
}
document.addEventListener('mousemove',resetHide);
document.addEventListener('touchstart',resetHide);
resetHide();

// Click on canvas to toggle controls
canvas.addEventListener('click',()=>{
  const ctrl=document.getElementById('controls');
  ctrl.classList.toggle('hidden');
  if(!ctrl.classList.contains('hidden'))resetHide();
});

// Handle file end
setInterval(()=>{
  if(AUDIO.mode==='file'&&AUDIO.isPlaying&&AUDIO.buffer){
    const elapsed=AUDIO.ctx.currentTime-AUDIO.startTime;
    if(elapsed>=AUDIO.bufferDuration){
      AUDIO.mode='demo';AUDIO.isPlaying=false;
      playBtn.textContent='▶';
    }
  }
},1000);

console.log('Music Visualizer ready! Enjoy ♪');
</script>
</body>
